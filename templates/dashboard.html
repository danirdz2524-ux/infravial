<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

<div class="wrapper">

    <aside class="sidebar">

        <h2 class="logo">InfraVial</h2>

        <ul class="menu">

            <li>
                <a href="/dashboard">Dashboard</a>
            </li>

            <li>
                <a href="/formulario">Nueva Ficha</a>
            </li>

            <li>
                <a href="/registros">Ver Registros</a>
            </li>

            <li>
                <a href="#">Usuarios</a>
            </li>

            <li>
                <a href="/logout">Cerrar sesión</a>
            </li>

        </ul>

    </aside>

    <main class="main-content">

        <div class="topbar">

            <h3>
                Bienvenido {{ user }}
            </h3>

        </div>

        <div class="row mt-4">

            <div class="col-md-4">

                <div class="stat-card">

                    <h5>Total Registros</h5>

                    <h2>{{ total }}</h2>

                </div>

            </div>

        </div>

    </main>

</div>

</body>
</html>
